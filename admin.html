<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Console - Rural Health Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      /* Light mode colors */
      --bg-primary: #f5f7fa;
      --bg-secondary: #f3f4f6;
      --card-bg: rgba(255, 255, 255, 0.7);
      --text-primary: #0f172e;
      --text-secondary: #8b93a1;
      --text-light: #0f172e;
      --border-color: rgba(168, 85, 247, 0.2);
      --primary: #a855f7;
      --primary-dark: #9333ea;
      --secondary: #06b6d4;
      --danger: #f43f5e;
      --success: #34c759;
      --warning: #ffbd0f;
      --shadow-sm: 0 4px 16px rgba(168, 85, 247, 0.08);
      --shadow-md: 0 8px 32px rgba(168, 85, 247, 0.12);
      --shadow-lg: 0 16px 48px rgba(168, 85, 247, 0.15);
      --radius: 24px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --blur: blur(40px);
    }

    html.dark-mode {
      /* Dark mode colors */
      --bg-primary: #0a0a1a;
      --bg-secondary: #151530;
      --card-bg: rgba(20, 15, 40, 0.55);
      --text-primary: #ffffff;
      --text-secondary: #b0b8cc;
      --text-light: #ffffff;
      --border-color: rgba(168, 85, 247, 0.2);
      --shadow-sm: 0 8px 32px rgba(168, 85, 247, 0.15);
      --shadow-md: 0 16px 48px rgba(168, 85, 247, 0.2);
      --shadow-lg: 0 25px 50px rgba(168, 85, 247, 0.25);
      --blur: blur(50px);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: var(--transition);
      overflow-x: hidden;
      background-attachment: fixed;
    }

    html.dark-mode body {
      background: #0a0a1a;
      background-image:
        radial-gradient(circle at 30% 20%, rgba(168, 85, 247, 0.25), transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(236, 72, 153, 0.2), transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.15), transparent 60%);
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      pointer-events: none;
      z-index: -1;
      transition: background 0.5s ease;
    }

    /* Dynamic time-based background */
    body.time-dawn::before {
      background:
        radial-gradient(circle at 100% 0%, rgba(255, 149, 0, 0.1), transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(196, 181, 253, 0.06), transparent 50%);
    }

    body.time-morning::before {
      background:
        radial-gradient(circle at 100% 0%, rgba(52, 199, 89, 0.08), transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(255, 149, 0, 0.06), transparent 50%);
    }

    body.time-afternoon::before {
      background:
        radial-gradient(circle at 100% 0%, rgba(52, 199, 89, 0.06), transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(255, 149, 0, 0.04), transparent 50%);
    }

    body.time-evening::before {
      background:
        radial-gradient(circle at 100% 0%, rgba(255, 149, 0, 0.12), transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(168, 85, 247, 0.06), transparent 50%);
    }

    body.time-night::before {
      background:
        radial-gradient(circle at 100% 0%, rgba(59, 130, 246, 0.06), transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(168, 85, 247, 0.06), transparent 50%);
    }

    html.dark-mode body.time-dawn::before,
    html.dark-mode body.time-morning::before,
    html.dark-mode body.time-afternoon::before,
    html.dark-mode body.time-evening::before,
    html.dark-mode body.time-night::before {
      background: none;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .header h1 {
      margin: 0;
      font-family: "Outfit", sans-serif;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.9; }
    }

    .header > p {
      color: var(--text-secondary);
    }

    .header-actions {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Theme Toggle */
    .theme-toggle {
      position: relative;
      width: 60px;
      height: 32px;
      background: var(--border-color);
      border-radius: 999px;
      border: 2px solid var(--border-color);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      padding: 0 4px;
    }

    .theme-toggle:hover {
      border-color: var(--primary);
    }

    .theme-toggle.active {
      background: var(--primary);
      border-color: var(--primary);
    }

    .toggle-circle {
      width: 24px;
      height: 24px;
      background: var(--card-bg);
      border-radius: 50%;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .theme-toggle.active .toggle-circle {
      margin-left: auto;
    }

    /* Card */
    .card {
      background: var(--card-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      margin-bottom: 20px;
    }

    html.dark-mode .card {
      background: var(--card-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-color: rgba(168, 85, 247, 0.2);
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--primary);
      transform: translateY(-4px);
    }

    .card h2, .card h3 {
      margin: 0 0 16px 0;
      font-family: "Outfit", sans-serif;
      font-weight: 700;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      color: #1a1a2e;
      transition: var(--transition);
    }

    html.dark-mode input, html.dark-mode select, html.dark-mode textarea {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      color: #1a1a2e;
      border-color: rgba(168, 85, 247, 0.3);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
      background: rgba(255, 255, 255, 1);
    }

    html.dark-mode input:focus, html.dark-mode select:focus, html.dark-mode textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3);
      background: rgba(255, 255, 255, 1);
    }

    /* Ensure text inside cards remains readable */
    .card h2, .card h3, .card h4, .card p, .card label, .card strong {
      color: var(--text-primary);
    }

    html.dark-mode .card h2, html.dark-mode .card h3, html.dark-mode .card h4 {
      color: #ffffff;
    }

    html.dark-mode .card p, html.dark-mode .card label {
      color: #ffffff;
    }

    html.dark-mode .card strong {
      color: #ffffff;
    }

    html.dark-mode .list-item-title {
      color: #ffffff;
    }

    html.dark-mode .list-item-meta {
      color: var(--text-secondary);
    }

    /* Buttons */
    .btn {
      padding: 11px 16px;
      border: 0;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), #055d47);
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--secondary), #ea580c);
      color: #fff;
    }

    .btn-secondary:hover {
      background: linear-gradient(135deg, #fb923c, var(--secondary));
    }

    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #991b1b);
      color: #fff;
    }

    .btn-danger:hover {
      background: linear-gradient(135deg, #f87171, var(--danger));
    }

    .btn-warning {
      background: linear-gradient(135deg, var(--warning), #d97706);
      color: #fff;
    }

    .btn-warning:hover {
      background: linear-gradient(135deg, #fbbf24, var(--warning));
    }

    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-ghost:hover {
      background: var(--bg-secondary);
      border-color: var(--primary);
      color: var(--text-primary);
    }

    html.dark-mode .btn-ghost {
      color: var(--text-primary);
    }

    .btn-small {
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    /* Pill Badge */
    .pill {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(5, 150, 105, 0.15);
      color: var(--primary);
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      border: 1px solid rgba(5, 150, 105, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    html.dark-mode .pill {
      background: rgba(16, 185, 129, 0.2);
      border-color: rgba(16, 185, 129, 0.4);
    }

    .pill.danger {
      background: rgba(220, 38, 38, 0.15);
      color: var(--danger);
      border-color: rgba(220, 38, 38, 0.3);
    }

    html.dark-mode .pill.danger {
      background: rgba(220, 38, 38, 0.2);
      border-color: rgba(220, 38, 38, 0.4);
    }

    .pill.warning {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border-color: rgba(245, 158, 11, 0.3);
    }

    html.dark-mode .pill.warning {
      background: rgba(245, 158, 11, 0.2);
      border-color: rgba(245, 158, 11, 0.4);
    }

    .pill.success {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border-color: rgba(16, 185, 129, 0.3);
    }

    html.dark-mode .pill.success {
      background: rgba(16, 185, 129, 0.2);
      border-color: rgba(16, 185, 129, 0.4);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: cardFloat 3s ease-in-out infinite;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
    }

    @keyframes cardFloat {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    .stat-card h4 {
      margin: 0 0 8px 0;
      font-size: 0.9rem;
      opacity: 0.9;
      font-weight: 600;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 800;
      font-family: "Outfit", sans-serif;
      margin: 0;
    }

    /* Login Section */
    .login-container {
      max-width: 400px;
      margin: 60px auto;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html.dark-mode .login-card {
      background: rgba(15, 22, 41, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card h1 {
      text-align: center;
      margin: 0 0 8px 0;
      font-family: "Outfit", sans-serif;
    }

    .login-card .subtitle {
      text-align: center;
      color: var(--text-secondary);
      margin: 0 0 24px 0;
    }

    .login-card .btn {
      width: 100%;
      justify-content: center;
    }

    /* Messages */
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.95rem;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
    }

    .message.error {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: var(--danger);
    }

    /* List Item */
    .list-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      transition: var(--transition);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    html.dark-mode .list-item {
      background: rgba(10, 14, 39, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .list-item:hover {
      border-color: var(--primary);
      background: var(--card-bg);
      transform: translateX(4px);
    }

    html.dark-mode .list-item:hover {
      background: rgba(15, 22, 41, 0.9);
    }

    .list-item-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .list-item-title {
      font-weight: 700;
      margin: 0;
      color: var(--text-primary);
    }

    .list-item-meta {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin: 4px 0;
    }

    .list-item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    /* Admin Area */
    .admin-area {
      display: none;
    }

    .admin-area.show {
      display: block;
    }

    /* Hidden */
    .hidden {
      display: none !important;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 16px;
      }

      .login-card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🏥 Admin Console</h1>
        <p style="color: var(--text-secondary); margin: 4px 0 0 0;">Manage Rural Health Helper Platform</p>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="theme-toggle" title="Toggle Dark Mode">
          <span class="toggle-circle">☀️</span>
        </button>
      </div>
    </div>

    <!-- Login Section -->
    <div class="login-container" id="login-section">
      <div class="login-card">
        <h1>Admin Access</h1>
        <p class="subtitle">Enter your credentials to continue</p>

        <div class="message" id="loginMessage"></div>

        <form id="loginForm" class="form-group" autocomplete="off">
          <label>Phone Number</label>
          <input
            type="tel"
            name="phone"
            id="adminPhoneInput"
            required
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            inputmode="numeric"
          >

          <label style="margin-top: 16px;">Password</label>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input
              type="password"
              name="password"
              id="adminPasswordInput"
              required
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              style="flex: 1;"
            >
            <button type="button" id="togglePassword" class="btn btn-ghost" style="padding: 11px 14px; min-width: auto; width: auto;">
              👁️
            </button>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px; justify-content: center;">
            Sign In
          </button>
        </form>

      </div>
    </div>

    <!-- Admin Area -->
    <div class="admin-area" id="adminArea">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <h4>Total Patients</h4>
          <p class="value" id="countPatients">0</p>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #f97316, #ea580c);">
          <h4>Total Vendors</h4>
          <p class="value" id="countVendors">0</p>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">
          <h4>Total Doctors</h4>
          <p class="value" id="countDoctors">0</p>
        </div>
      </div>

      <!-- Actions Toolbar -->
      <div class="card">
        <div class="toolbar">
          <button class="btn btn-primary" id="btnRefresh">🔄 Refresh</button>
          <button class="btn btn-warning btn-small" id="btnMerge">Merge Duplicates</button>
          <button class="btn btn-danger btn-small" id="btnClearPatients">Clear Patients</button>
          <button class="btn btn-danger btn-small" id="btnClearVendors">Clear Vendors</button>
          <button class="btn btn-danger btn-small" id="btnClearDoctors">Clear Doctors</button>
          <button class="btn btn-ghost" id="btnLogout" style="margin-left: auto;">Logout</button>
        </div>
      </div>

      <!-- Patients -->
      <div class="card">
        <h3>👥 Patients</h3>
        <div id="patientsList"></div>
      </div>

      <!-- Vendors -->
      <div class="card">
        <h3>🏪 Vendors & Medical Stores</h3>
        <div id="vendorsList"></div>
      </div>

      <!-- Doctors -->
      <div class="card">
        <h3>👨‍⚕️ Doctors</h3>
        <div id="doctorsList"></div>
      </div>

      <!-- Broadcast -->
      <div class="card">
        <h3>📢 Broadcast Message</h3>
        <form id="broadcastForm">
          <div class="form-group">
            <label>Target Audience</label>
            <select name="target" required>
              <option value="all">All Users</option>
              <option value="patients">All Patients</option>
              <option value="vendors">All Vendors</option>
              <option value="doctors">All Doctors</option>
            </select>
          </div>

          <div class="form-group">
            <label>Message</label>
            <input
              type="text"
              name="message"
              placeholder="Enter broadcast message"
              required
            >
          </div>

          <button type="submit" class="btn btn-secondary">Start Broadcasting</button>
        </form>
        <div class="message" id="broadcastMessage"></div>
        
        <!-- Active Broadcasts -->
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);">
          <h4>Active Broadcasts</h4>
          <div id="activeBroadcasts" style="margin-top: 15px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Time-based background effect
    function updateTimeBasedBackground() {
      const hour = new Date().getHours();
      let timeClass = 'time-morning';

      if (hour >= 5 && hour < 8) {
        timeClass = 'time-dawn';
      } else if (hour >= 8 && hour < 12) {
        timeClass = 'time-morning';
      } else if (hour >= 12 && hour < 17) {
        timeClass = 'time-afternoon';
      } else if (hour >= 17 && hour < 21) {
        timeClass = 'time-evening';
      } else {
        timeClass = 'time-night';
      }

      document.body.className = timeClass;
    }

    // Update on load and every minute
    updateTimeBasedBackground();
    setInterval(updateTimeBasedBackground, 60000);

    // Theme Toggle
    const themeToggle = document.getElementById('theme-toggle');
    const htmlElement = document.documentElement;

    // Load saved theme preference
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      htmlElement.classList.add('dark-mode');
      themeToggle.classList.add('active');
      themeToggle.querySelector('.toggle-circle').textContent = '🌙';
    }

    themeToggle.addEventListener('click', () => {
      htmlElement.classList.toggle('dark-mode');
      themeToggle.classList.toggle('active');
      const isDark = htmlElement.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeToggle.querySelector('.toggle-circle').textContent = isDark ? '🌙' : '☀️';
    });

    // Admin Functions
    const el = (id) => document.getElementById(id);
    const apiBase = '';
    const state = {
      token: localStorage.getItem('admin_token') || ''
    };

    function showMessage(elementId, message, type = 'success') {
      const msgEl = el(elementId);
      msgEl.textContent = message;
      msgEl.className = `message show ${type}`;
      setTimeout(() => msgEl.classList.remove('show'), 5000);
    }

    function setToken(t) {
      state.token = t || '';
      if (state.token) localStorage.setItem('admin_token', state.token);
      else localStorage.removeItem('admin_token');
    }

    async function request(path, opts = {}) {
      const headers = opts.headers || {};
      if (state.token) headers['X-Admin-Token'] = state.token;

      const response = await fetch(apiBase + path, { ...opts, headers });

      if (response.status === 401) {
        setToken('');
        showAdminArea(false);
        showMessage('loginMessage', 'Session expired. Please login again.', 'error');
        throw new Error('Admin auth required');
      }

      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || 'Request failed');
      }

      const contentType = response.headers.get('content-type') || '';
      return contentType.includes('application/json') ? response.json() : response.text();
    }

    function showAdminArea(show) {
      const loginSection = el('login-section');
      const adminArea = el('adminArea');

      if (loginSection) loginSection.style.display = show ? 'none' : 'block';
      if (adminArea) adminArea.classList.toggle('show', show);
    }

    async function loadPatients() {
      try {
        const data = await request('/admin/patients');
        const list = el('patientsList');
        list.innerHTML = '';

        if (!data.patients || data.patients.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👤</div><p>No patients found</p></div>';
          return [];
        }

        data.patients.forEach((u) => {
          const html = document.createElement('div');
          html.className = 'list-item';
          html.innerHTML = `
            <div class="list-item-header">
              <p class="list-item-title">${u.first_name || ''} ${u.last_name || ''}</p>
              <span class="pill">${u.phone || '-'}</span>
            </div>
            <div class="list-item-meta">📧 ${u.email || 'No email'}</div>
            <div class="list-item-meta">ID: ${u.id}</div>
            <div class="list-item-actions">
              <button class="btn btn-danger btn-small" data-action="delete">Delete</button>
            </div>
          `;

          html.querySelector('[data-action="delete"]').onclick = async () => {
            if (!confirm('Delete this patient permanently?')) return;
            try {
              await request(`/admin/patient/${u.id}`, { method: 'DELETE' });
              await loadPatients();
              showMessage('loginMessage', 'Patient deleted', 'success');
            } catch (err) {
              showMessage('loginMessage', 'Delete failed: ' + err.message, 'error');
            }
          };

          list.appendChild(html);
        });

        return data.patients;
      } catch (err) {
        el('patientsList').innerHTML = `<div class="empty-state"><p style="color: var(--danger);">Error loading patients: ${err.message}</p></div>`;
        return [];
      }
    }

    async function loadVendors() {
      try {
        const data = await request('/vendors');
        const list = el('vendorsList');
        list.innerHTML = '';

        if (!data.vendors || data.vendors.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏪</div><p>No vendors found</p></div>';
          return [];
        }

        data.vendors.forEach((v) => {
          const html = document.createElement('div');
          html.className = 'list-item';
          const statusPill = `<span class="pill ${v.status === 'blocked' ? 'danger' : v.status === 'approved' ? 'success' : 'warning'}">${v.status || 'unknown'}</span>`;
          html.innerHTML = `
            <div class="list-item-header">
              <p class="list-item-title">${v.shop_name || 'Shop'}</p>
              ${statusPill}
            </div>
            <div class="list-item-meta">👤 ${v.first_name || ''} ${v.last_name || ''}</div>
            <div class="list-item-meta">📞 ${v.phone || '-'}</div>
            <div class="list-item-meta">📍 ${v.shop_address || 'No address'}</div>
            <div class="list-item-actions">
              <button class="btn btn-primary btn-small" data-action="approve">Approve</button>
              <button class="btn btn-warning btn-small" data-action="block">Block</button>
              <button class="btn btn-danger btn-small" data-action="delete">Delete</button>
            </div>
          `;

          html.querySelector('[data-action="approve"]').onclick = async () => {
            try {
              await request(`/admin/vendor/${v.id}/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reason: 'Approved from admin console' })
              });
              await loadVendors();
              showMessage('loginMessage', 'Vendor approved', 'success');
            } catch (err) {
              showMessage('loginMessage', 'Error: ' + err.message, 'error');
            }
          };

          html.querySelector('[data-action="block"]').onclick = async () => {
            try {
              await request(`/admin/vendor/${v.id}/block`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reason: 'Blocked from admin console' })
              });
              await loadVendors();
              showMessage('loginMessage', 'Vendor blocked', 'success');
            } catch (err) {
              showMessage('loginMessage', 'Error: ' + err.message, 'error');
            }
          };

          html.querySelector('[data-action="delete"]').onclick = async () => {
            if (!confirm('Delete this vendor permanently?')) return;
            try {
              await request(`/admin/vendor/${v.id}`, { method: 'DELETE' });
              await loadVendors();
              showMessage('loginMessage', 'Vendor deleted', 'success');
            } catch (err) {
              showMessage('loginMessage', 'Delete failed: ' + err.message, 'error');
            }
          };

          list.appendChild(html);
        });

        return data.vendors;
      } catch (err) {
        el('vendorsList').innerHTML = `<div class="empty-state"><p style="color: var(--danger);">Error loading vendors: ${err.message}</p></div>`;
        return [];
      }
    }

    async function loadDoctors() {
      try {
        const data = await request('/admin/doctors');
        const list = el('doctorsList');
        list.innerHTML = '';

        if (!data.doctors || data.doctors.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👨‍⚕️</div><p>No doctors found</p></div>';
          return [];
        }

        data.doctors.forEach((d) => {
          const html = document.createElement('div');
          html.className = 'list-item';
          const statusPill = `<span class="pill ${d.status === 'blocked' ? 'danger' : d.status === 'approved' ? 'success' : 'warning'}">${d.status || 'unknown'}</span>`;
          html.innerHTML = `
            <div class="list-item-header">
              <p class="list-item-title">Dr. ${d.first_name || ''} ${d.last_name || ''}</p>
              ${statusPill}
            </div>
            <div class="list-item-meta">📞 ${d.phone || '-'}</div>
            <div class="list-item-meta">🔖 Specialization: ${d.specialization || 'General Physician'}</div>
            <div class="list-item-meta">📜 License: ${d.license_no || '-'}</div>
            <div class="list-item-actions">
              <button class="btn btn-primary btn-small" data-action="approve">Approve</button>
              <button class="btn btn-warning btn-small" data-action="block">Block</button>
              <button class="btn btn-danger btn-small" data-action="delete">Delete</button>
            </div>
          `;

          html.querySelector('[data-action="approve"]').onclick = async () => {
            try {
              await request(`/admin/doctor/${d.id}/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reason: 'Approved from admin console' })
              });
              await loadDoctors();
              showMessage('loginMessage', 'Doctor approved', 'success');
            } catch (err) {
              showMessage('loginMessage', 'Error: ' + err.message, 'error');
            }
          };

          html.querySelector('[data-action="block"]').onclick = async () => {
            try {
              await request(`/admin/doctor/${d.id}/block`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reason: 'Blocked from admin console' })
              });
              await loadDoctors();
              showMessage('loginMessage', 'Doctor blocked', 'success');
            } catch (err) {
              showMessage('loginMessage', 'Error: ' + err.message, 'error');
            }
          };

          html.querySelector('[data-action="delete"]').onclick = async () => {
            if (!confirm('Delete this doctor permanently?')) return;
            try {
              await request(`/admin/doctor/${d.id}`, { method: 'DELETE' });
              await loadDoctors();
              showMessage('loginMessage', 'Doctor deleted', 'success');
            } catch (err) {
              showMessage('loginMessage', 'Delete failed: ' + err.message, 'error');
            }
          };

          list.appendChild(html);
        });

        return data.doctors;
      } catch (err) {
        el('doctorsList').innerHTML = `<div class="empty-state"><p style="color: var(--danger);">Error loading doctors: ${err.message}</p></div>`;
        return [];
      }
    }

    async function loadAll() {
      try {
        const [patients, vendors, doctors] = await Promise.all([loadPatients(), loadVendors(), loadDoctors()]);
        el('countPatients').textContent = patients.length;
        el('countVendors').textContent = vendors.length;
        el('countDoctors').textContent = doctors.length;
      } catch (err) {
        showMessage('loginMessage', 'Failed to load data: ' + err.message, 'error');
      }
    }

    // Event Listeners

    // Password visibility toggle
    el('togglePassword')?.addEventListener('click', (e) => {
      e.preventDefault();
      const passwordInput = el('adminPasswordInput');
      const toggleBtn = el('togglePassword');
      if (!passwordInput) return;

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        if (toggleBtn) toggleBtn.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        if (toggleBtn) toggleBtn.textContent = '👁️';
      }
    });

    el('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const fd = new FormData(e.target);
        const phone = String(fd.get('phone') || '').trim();
        const password = String(fd.get('password') || '').trim();

        // Always authenticate with server to obtain a valid admin token
        try {
          const response = await fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone, password: password })
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            showMessage('loginMessage', data.detail || 'Invalid credentials', 'error');
            return;
          }

          setToken(data.token);
          showMessage('loginMessage', 'Login successful!', 'success');
          showAdminArea(true);
          await loadAll();
          return;
        } catch (apiErr) {
          showMessage('loginMessage', 'Invalid phone number or password', 'error');
          return;
        }
      } catch (err) {
        showMessage('loginMessage', 'Login error: ' + err.message, 'error');
      }
    });

    el('btnLogout').addEventListener('click', () => {
      setToken('');
      showAdminArea(false);
      el('loginForm').reset();
      showMessage('loginMessage', 'Logged out', 'success');
    });

    el('btnRefresh').addEventListener('click', loadAll);

    el('btnMerge').addEventListener('click', async () => {
      if (!confirm('Merge duplicate patients by phone?')) return;
      try {
        await request('/admin/merge_duplicates', { method: 'POST' });
        await loadAll();
        showMessage('loginMessage', 'Duplicates merged', 'success');
      } catch (err) {
        showMessage('loginMessage', 'Error: ' + err.message, 'error');
      }
    });

    el('btnClearPatients').addEventListener('click', async () => {
      if (!confirm('Clear all patients? This cannot be undone.')) return;
      try {
        await request('/admin/clear_patients', { method: 'POST' });
        await loadPatients();
        showMessage('loginMessage', 'Patients cleared', 'success');
      } catch (err) {
        showMessage('loginMessage', 'Error: ' + err.message, 'error');
      }
    });

    el('btnClearVendors').addEventListener('click', async () => {
      if (!confirm('Clear all vendors? This cannot be undone.')) return;
      try {
        await request('/admin/clear_vendors', { method: 'POST' });
        await loadVendors();
        showMessage('loginMessage', 'Vendors cleared', 'success');
      } catch (err) {
        showMessage('loginMessage', 'Error: ' + err.message, 'error');
      }
    });

    el('btnClearDoctors').addEventListener('click', async () => {
      if (!confirm('Clear all doctors? This cannot be undone.')) return;
      try {
        await request('/admin/clear_doctors', { method: 'POST' });
        await loadDoctors();
        showMessage('loginMessage', 'Doctors cleared', 'success');
      } catch (err) {
        showMessage('loginMessage', 'Error: ' + err.message, 'error');
      }
    });

    el('broadcastForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const fd = new FormData(e.target);
        const result = await request('/admin/broadcast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: fd.get('message'),
            target: fd.get('target')
          })
        });
        showMessage('broadcastMessage', 'Broadcasting started!', 'success');
        e.target.reset();
        refreshActiveBroadcasts();
      } catch (err) {
        showMessage('broadcastMessage', 'Error: ' + err.message, 'error');
      }
    });
    
    // Refresh active broadcasts every 2 seconds
    async function refreshActiveBroadcasts() {
      try {
        const res = await request('/admin/broadcasts', { method: 'GET' });
        const container = el('activeBroadcasts');
        if (!res.broadcasts || res.broadcasts.length === 0) {
          container.innerHTML = '<p style="color: var(--text-secondary);">No active broadcasts</p>';
          return;
        }
        container.innerHTML = res.broadcasts.map(b => `
          <div style="background: rgba(168, 85, 247, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--primary);">
            <div style="display: flex; justify-content: space-between; align-items: start; gap: 10px;">
              <div style="flex: 1;">
                <div style="font-weight: 600; margin-bottom: 4px;">Target: <span style="color: var(--primary);">${b.target}</span></div>
                <div style="font-size: 0.95rem; margin-bottom: 8px;">${b.message}</div>
                <div style="font-size: 0.85rem; color: var(--text-secondary);">Started: ${new Date(b.start_ts * 1000).toLocaleString()}</div>
              </div>
              <button class="btn btn-danger" onclick="stopBroadcast('${b.id}')" style="white-space: nowrap;">Stop</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Error refreshing broadcasts:', err);
      }
    }
    
    // Stop broadcast function
    window.stopBroadcast = async function(broadcastId) {
      try {
        await request(`/admin/broadcast/${broadcastId}/stop`, { method: 'POST' });
        showMessage('broadcastMessage', 'Broadcast stopped!', 'success');
        refreshActiveBroadcasts();
      } catch (err) {
        showMessage('broadcastMessage', 'Error stopping broadcast: ' + err.message, 'error');
      }
    };
    
    // Poll active broadcasts every 2 seconds
    setInterval(refreshActiveBroadcasts, 2000);
    refreshActiveBroadcasts();

    // Always start with login section first
    showAdminArea(false);

    // Check if already logged in
    if (state.token) {
      showAdminArea(true);
      loadAll();
    }
  </script>
</body>
</html>
